name: Upstream Sync Monitor

on:
  schedule:
    # Calendar-based ten-day cadence at 03:17 UTC (days 1, 11, and 21).
    - cron: "17 3 1,11,21 * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: upstream-sync-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml requests pytest

      - name: Validate monitor configuration
        run: python -m pytest -q tests/test_check_upstream_sync.py

      - name: Run upstream drift check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
        run: python scripts/check_upstream_sync.py

      - name: Commit state and report if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/upstream-state.json reports/upstream-drift-report.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: refresh upstream synchronization state"
            git push
          fi
