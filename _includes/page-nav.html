{% if page.previous_page or page.next_page %}
<nav class="page-navigation" aria-label="Documentation sequence">
  <div class="page-navigation__item page-navigation__previous">
    {% if page.previous_page %}
      <span class="page-navigation__label">Previous</span>
      <a href="{{ page.previous_page.url | relative_url }}">← {{ page.previous_page.title }}</a>
    {% endif %}
  </div>
  <div class="page-navigation__item page-navigation__next">
    {% if page.next_page %}
      <span class="page-navigation__label">Next</span>
      <a href="{{ page.next_page.url | relative_url }}">{{ page.next_page.title }} →</a>
    {% endif %}
  </div>
</nav>
{% endif %}
